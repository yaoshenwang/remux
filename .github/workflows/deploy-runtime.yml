name: Deploy Runtime

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: Runtime target
        required: true
        type: choice
        options:
          - main
          - dev
          - all

jobs:
  deploy-main:
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'main' || inputs.target == 'all'))
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - remux-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    environment:
      name: production
    concurrency:
      group: remux-production-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false

      - name: Install runtime launchd definitions
        run: bash scripts/install-launchd.sh

      - name: Load production runtime service
        run: bash scripts/load-launchd.sh main

      - name: Sync production runtime
        run: bash scripts/sync-runtime.sh main --verify-public

      - name: Show production runtime status
        if: always()
        run: bash scripts/check-runtime-status.sh main

  deploy-dev:
    if: github.ref_name == 'dev' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'dev' || inputs.target == 'all'))
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - remux-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    environment:
      name: development
    concurrency:
      group: remux-development-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false

      - name: Install runtime launchd definitions
        run: bash scripts/install-launchd.sh

      - name: Load development runtime service
        run: bash scripts/load-launchd.sh dev

      - name: Sync development runtime
        run: bash scripts/sync-runtime.sh dev --verify-public

      - name: Show development runtime status
        if: always()
        run: bash scripts/check-runtime-status.sh dev
