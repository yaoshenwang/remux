name: Deploy Runtime

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: Runtime target
        required: true
        type: choice
        options:
          - main
          - dev
          - all
      promote_shared_runtime:
        description: Promote the shared runtime-v2 core after syncing dev
        required: false
        default: false
        type: boolean

jobs:
  deploy-main:
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && (inputs.target == 'main' || inputs.target == 'all'))
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - remux-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    environment:
      name: production
    concurrency:
      group: remux-production-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install runtime launchd definitions
        run: bash scripts/install-launchd.sh

      - name: Sync production runtime
        run: bash scripts/sync-runtime.sh main --verify-public

      - name: Show production runtime status
        if: always()
        run: bash scripts/check-runtime-status.sh main

  deploy-dev:
    if: (github.event_name == 'push' && github.ref_name == 'dev') || (github.event_name == 'workflow_dispatch' && (inputs.target == 'dev' || inputs.target == 'all'))
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - remux-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    environment:
      name: development
    concurrency:
      group: remux-development-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install runtime launchd definitions
        run: bash scripts/install-launchd.sh

      - name: Sync development runtime
        run: |
          args=(dev --verify-public)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.promote_shared_runtime }}" == "true" ]]; then
            args+=(--promote-shared-runtime)
          fi
          bash scripts/sync-runtime.sh "${args[@]}"

      - name: Show development runtime status
        if: always()
        run: bash scripts/check-runtime-status.sh dev
