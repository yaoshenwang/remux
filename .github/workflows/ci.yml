name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and Integration Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

  runtime-v2-native-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check runtime-v2 native workspace
        run: cargo check --workspace --manifest-path Cargo.toml

  browser-e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run runtime-v2 browser contract tests
        run: npm run test:e2e:functional

      - name: Upload E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-v2-browser-test-results
          path: test-results/
          retention-days: 7

  browser-width:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run terminal width invariant tests
        run: npm run test:e2e:width

      - name: Upload Width Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: terminal-width-test-results
          path: test-results/
          retention-days: 7
