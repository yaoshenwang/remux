name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and Integration Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run

  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: remux-zellij-bridge-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: remux-zellij-bridge-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: remux-zellij-bridge-darwin-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: remux-zellij-bridge-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build bridge
        run: cargo build --manifest-path native/zellij-bridge/Cargo.toml --release --target ${{ matrix.target }}

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: native/zellij-bridge/target/${{ matrix.target }}/release/zellij-bridge
          if-no-files-found: error

  real-tmux-smoke:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install Dependencies
        run: npm ci

      - name: Run Real Tmux Smoke Test
        run: npm run test:smoke

  real-zellij-smoke:
    runs-on: ubuntu-latest
    needs: [test-and-build, build-bridge]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install zellij
        run: |
          curl -L https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Download bridge artifact
        uses: actions/download-artifact@v7
        with:
          name: remux-zellij-bridge-linux-x64
          path: native/zellij-bridge/target/release/

      - name: Make bridge executable
        run: chmod +x native/zellij-bridge/target/release/zellij-bridge

      - name: Install Dependencies
        run: npm ci

      - name: Run Real Zellij Smoke Test
        run: REAL_ZELLIJ_SMOKE=1 npx vitest run tests/smoke/real-zellij.test.ts
        env:
          REAL_ZELLIJ_SMOKE: "1"

  browser-e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Browser E2E Tests
        run: npm run test:e2e

      - name: Upload E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

  real-zellij-browser-e2e:
    runs-on: ubuntu-latest
    needs: [test-and-build, build-bridge]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install zellij
        run: |
          curl -L https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Download bridge artifact
        uses: actions/download-artifact@v7
        with:
          name: remux-zellij-bridge-linux-x64
          path: bridge-artifacts/remux-zellij-bridge-linux-x64

      - name: Stage bridge binary for browser E2E
        run: |
          mkdir -p dist/backend/zellij
          cp bridge-artifacts/remux-zellij-bridge-linux-x64/zellij-bridge dist/backend/zellij/remux-zellij-bridge-linux-x64
          chmod +x dist/backend/zellij/remux-zellij-bridge-linux-x64

      - name: Run Real Zellij Browser E2E
        run: npm run test:e2e:real-zellij

      - name: Upload Real Zellij E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: real-zellij-e2e-test-results
          path: test-results/
          retention-days: 7
