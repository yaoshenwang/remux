name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Terminology Guard
        run: npm run check:terminology

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run
