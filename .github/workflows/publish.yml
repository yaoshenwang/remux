name: Publish

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CREATE_DMG_VERSION: 8.0.0

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --latest
          else
            gh release create "$TAG" --repo "$REPO" --verify-tag --generate-notes --latest
          fi

  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: npx playwright install --with-deps chromium
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run test:e2e
      - run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  macos:
    needs: [ensure-release]
    runs-on: [self-hosted, remux-deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Guard immutable release assets
        id: guard_release_assets
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateReleaseAssetGuard } = require(
              `${process.env.GITHUB_WORKSPACE}/scripts/release-asset-guard.cjs`
            );
            const tag = context.ref.replace('refs/tags/', '');
            core.setOutput('skip_all', 'false');
            core.setOutput('release_state', 'clear');

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              const existingAssetNames = (release.data.assets || []).map((asset) => asset.name);
              const {
                conflicts,
                missingImmutableAssets,
                guardState,
                hasPartialConflict,
                shouldSkipBuildAndUpload,
              } = evaluateReleaseAssetGuard({ existingAssetNames });

              core.setOutput('release_state', guardState);

              if (hasPartialConflict) {
                core.setFailed(
                  `Release ${tag} has a partial immutable asset state. Existing immutable assets: ` +
                  `${conflicts.join(', ')}. Missing immutable assets: ${missingImmutableAssets.join(', ')}. ` +
                  'Resolve release assets manually before rerunning.'
                );
                return;
              }

              if (shouldSkipBuildAndUpload) {
                core.notice(
                  `Release ${tag} already contains immutable assets (${conflicts.join(', ')}). ` +
                  'Skipping build, notarization, and upload to preserve the published assets.'
                );
                core.setOutput('skip_all', 'true');
                return;
              }

              core.notice(`Release ${tag} exists but has no immutable assets yet; continuing.`);
            } catch (error) {
              if (error.status === 404) {
                core.notice(`Release ${tag} does not exist yet; safe to build and publish assets.`);
                return;
              }
              throw error;
            }

      - name: Reclaim macOS runner disk space
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          bash apps/macos/scripts/ci-preflight-free-space.sh

      - name: Prepare macOS notary credentials
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail
          python3 <<'PYEOF'
          import base64, os, pathlib

          private_keys = pathlib.Path.home() / ".private_keys"
          private_keys.mkdir(parents=True, exist_ok=True)
          key_path = private_keys / f"AuthKey_{os.environ['API_KEY_ID']}.p8"
          key_path.write_bytes(base64.b64decode(os.environ["API_KEY_P8"]))
          key_path.chmod(0o600)
          PYEOF

      - name: Install macOS release dependencies
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        run: |
          set -euo pipefail
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"

      - name: Verify signing identity
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        run: |
          security find-identity -v -p codesigning | grep "Developer ID Application"

      - name: Align macOS app version with release tag
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd apps/macos
          ./scripts/bump-version.sh "$VERSION"

      - name: Build, sign, notarize, and upload DMG
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        env:
          REMUX_SKIP_HOMEBREW_UPDATE: "true"
          GH_TOKEN: ${{ github.token }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          bash scripts/build-dmg.sh "$TAG"

      - name: Verify macOS release assets
        if: steps.guard_release_assets.outputs.skip_all != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_ASSETS="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true)"
          EXPECTED_ASSETS=(
            remux-macos.dmg
            appcast.xml
            remuxd-remote-darwin-arm64
            remuxd-remote-darwin-amd64
            remuxd-remote-linux-arm64
            remuxd-remote-linux-amd64
            remuxd-remote-checksums.txt
            remuxd-remote-manifest.json
          )

          for asset in "${EXPECTED_ASSETS[@]}"; do
            if ! printf '%s\n' "$RELEASE_ASSETS" | grep -Fxq "$asset"; then
              echo "Missing release asset: $asset" >&2
              exit 1
            fi
          done

  release-gate:
    needs: [npm, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:release-readiness:docs
      - run: pnpm run verify:release-readiness
