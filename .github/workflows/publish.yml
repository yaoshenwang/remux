name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: remux-zellij-bridge-linux-x64
            binary_name: remux-zellij-bridge-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: remux-zellij-bridge-linux-arm64
            binary_name: remux-zellij-bridge-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: remux-zellij-bridge-darwin-arm64
            binary_name: remux-zellij-bridge-darwin-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: remux-zellij-bridge-darwin-x64
            binary_name: remux-zellij-bridge-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build bridge
        run: cargo build --manifest-path native/zellij-bridge/Cargo.toml --release --target ${{ matrix.target }}

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: native/zellij-bridge/target/${{ matrix.target }}/release/zellij-bridge
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-bridge
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v7
        with:
          path: bridge-artifacts/

      - name: Collect bridge binaries into dist
        run: |
          mkdir -p dist/backend/zellij
          for dir in bridge-artifacts/remux-zellij-bridge-*; do
            platform=$(basename "$dir")
            cp "$dir/zellij-bridge" "dist/backend/zellij/$platform"
            chmod +x "dist/backend/zellij/$platform"
          done
          ls -la dist/backend/zellij/

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$BUMP" -m "v%s"
          echo "tag=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
        env:
          BUMP: ${{ inputs.bump }}

      - name: Push version commit and tag
        run: git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$TAG" --generate-notes

      - name: Publish to npm
        run: npm publish --access public
