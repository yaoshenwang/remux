name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (main or dev)"
        required: true
        default: "dev"
        type: choice
        options: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: [self-hosted, remux-deploy]
    timeout-minutes: 10

    steps:
      - name: Resolve target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ inputs.branch }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [ "$BRANCH" = "main" ]; then
            echo "app=remux-main" >> "$GITHUB_OUTPUT"
            echo "port=3456" >> "$GITHUB_OUTPUT"
            echo "worktree=$HOME/.remux/runtime-worktrees/runtime-main" >> "$GITHUB_OUTPUT"
          else
            echo "app=remux-dev" >> "$GITHUB_OUTPUT"
            echo "port=3457" >> "$GITHUB_OUTPUT"
            echo "worktree=$HOME/.remux/runtime-worktrees/runtime-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest code
        run: |
          set -euo pipefail
          WORKTREE="${{ steps.target.outputs.worktree }}"
          BRANCH="${{ steps.target.outputs.branch }}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "$(dirname "$WORKTREE")"

          if ! git -C "$WORKTREE" rev-parse --show-toplevel >/dev/null 2>&1; then
            echo "Runtime worktree at $WORKTREE is missing or invalid; recreating checkout"
            rm -rf "$WORKTREE"
            git clone --no-checkout "$REPO_URL" "$WORKTREE"
          fi

          git -C "$WORKTREE" remote set-url origin "$REPO_URL"
          git -C "$WORKTREE" fetch origin "$BRANCH"
          git -C "$WORKTREE" reset --hard
          git -C "$WORKTREE" checkout --detach "origin/$BRANCH"

      - name: Install dependencies
        working-directory: ${{ steps.target.outputs.worktree }}
        run: |
          # Use the same Node.js that the launchd service runs (node@24)
          # to ensure native modules (better-sqlite3, node-pty) are compiled
          # for the correct NODE_MODULE_VERSION
          export PATH="/opt/homebrew/opt/node@24/bin:$PATH"
          node --version
          pnpm install

      - name: Build
        working-directory: ${{ steps.target.outputs.worktree }}
        run: |
          export PATH="/opt/homebrew/opt/node@24/bin:$PATH"
          pnpm run build

      - name: Restart launchd service
        run: |
          SERVICE="com.remux.${{ steps.target.outputs.branch }}"
          launchctl kickstart -k "gui/$(id -u)/${SERVICE}"
          sleep 2
          launchctl print "gui/$(id -u)/${SERVICE}" 2>&1 | head -5

      - name: Verify runtime health
        run: |
          SERVICE="com.remux.${{ steps.target.outputs.branch }}"
          PORT="${{ steps.target.outputs.port }}"
          STATUS="$(launchctl print "gui/$(id -u)/${SERVICE}")"
          echo "$STATUS" | grep -q "/opt/homebrew/opt/node@24/bin/node"
          HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}/")"
          case "$HTTP_CODE" in
            200|403) ;;
            *)
              echo "unexpected healthcheck status: ${HTTP_CODE}"
              exit 1
              ;;
          esac
